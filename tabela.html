    "@context": "https://schema.org",
    "@type": "WebPage", "name": "Tabela de Pontuação SRDS FC 2026", "description": "Ranking dos atletas com pontos, gols e assistências da temporada 2026.",
    "url": "https://www.srdsfc.com.br/tabela.html",

<body>

  <header class="site-header"></header>

  <main class="section fade-in">
    <div class="section-header">
      <h2 class="section-title">Tabela de <span>Pontuação</span></h2>
      <span class="section-meta" id="matchesPlayed"></span>
    </div>
    <div class="gold-line"></div>

    <div class="ranking-filter-bar" id="filterBar"></div>
    <div class="standings-table-wrap">
      <table class="standings-table" id="standingsTable">
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-name">Atleta</th>
            <th title="Partidas Jogadas">PJ</th>
            <th title="Gols">G</th>
            <th title="Assistências">A</th>
            <th title="Participação em Gols (Gols + Assistências)">G+A</th>
            <th title="Pontos">PTS</th>
          </tr>
        </thead>
        <tbody id="standingsBody"></tbody>
      </table>
    </div>

    <p style="margin-top:14px; font-size:12px; color:var(--cinza); font-family:'Barlow Semi Condensed',sans-serif;">
      * PTS: Vitória = 3 pts · Empate = 1 pt · Derrota = 0 pts &nbsp;|&nbsp; Clique no atleta para ver o perfil
      completo.
    </p>
  </main>

  <footer class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script>
    renderHeader('tabela.html');
    renderFooter();

    const disputadas = SRDS.matches.filter(m => m.result !== null).length;
    document.getElementById('matchesPlayed').textContent =
      disputadas + ' rodada' + (disputadas !== 1 ? 's' : '') + ' disputada' + (disputadas !== 1 ? 's' : '');

    const allStandings = getStandings();
    const movement     = getRankingMovement('standings');
    const tbody        = document.getElementById('standingsBody');
    const filterBar    = document.getElementById('filterBar');

    const POSICOES = ['Goleiro','Fixo','Ala','Meia','Ponta','Centroavante'];
    let   filtroAtivo = null;

    // ── Botão "Todos" ──
    const btnTodos = document.createElement('button');
    btnTodos.className   = 'filter-btn active';
    btnTodos.textContent = 'Todos';
    btnTodos.addEventListener('click', function() { aplicarFiltro(null); });
    filterBar.appendChild(btnTodos);

    // ── Botões de posição (só cria se houver atletas naquela posição) ──
    POSICOES.forEach(function(pos) {
      if (!allStandings.some(function(p) { return p.position === pos; })) return;
      var btn = document.createElement('button');
      btn.className   = 'filter-btn';
      btn.textContent = pos;
      btn.addEventListener('click', function() { aplicarFiltro(pos); });
      filterBar.appendChild(btn);
    });

    function aplicarFiltro(pos) {
      filtroAtivo = pos;
      filterBar.querySelectorAll('.filter-btn').forEach(function(b) {
        b.classList.toggle('active', b.textContent === (pos || 'Todos'));
      });
      renderizarTabela();
    }

    function renderizarTabela() {
      tbody.innerHTML = '';

      // Mantém rank global real, filtra por posição se necessário
      var filtrados = allStandings.map(function(p, i) {
        return Object.assign({}, p, { globalRank: i + 1 });
      }).filter(function(p) {
        return !filtroAtivo || p.position === filtroAtivo;
      });

      filtrados.forEach(function(p) {
        var rank    = p.globalRank;
        var ga      = p.stats.goals + p.stats.assists;
        var rowCls  = rank <= 3 ? ' row-top' + rank : '';
        var rankCell = rank <= 3
          ? '<td class="col-rank"><span class="rank-badge rank-' + rank + '">' + rank + '</span></td>'
          : '<td class="col-rank">' + rank + '</td>';
        var injuryTag = p.injury ? ' <span class="ranking-injury-tag">🚑</span>' : '';
        var movBadge  = renderMovementBadge(movement[p.id]);

        var tr = document.createElement('tr');
        tr.className = rowCls;
        tr.innerHTML =
          rankCell +
          '<td class="col-name"><div class="player-name-cell">' +
            p.name + injuryTag + movBadge +
            '<span class="player-pos-pill">' + p.position + '</span>' +
          '</div></td>' +
          '<td>' + p.stats.matches  + '</td>' +
          '<td>' + p.stats.goals    + '</td>' +
          '<td>' + p.stats.assists  + '</td>' +
          '<td>' + ga               + '</td>' +
          '<td class="col-points">' + p.stats.points + '</td>';

        tr.addEventListener('click', function() {
          window.location.href = 'jogador.html?id=' + p.id;
        });
        tbody.appendChild(tr);
      });

      if (filtrados.length === 0) {
        var tr = document.createElement('tr');
        var td = document.createElement('td');
        td.colSpan = 7;
        td.style.cssText = 'text-align:center;color:var(--cinza);padding:20px;font-family:Barlow Semi Condensed,sans-serif;';
        td.textContent = 'Nenhum atleta nessa posição.';
        tr.appendChild(td);
        tbody.appendChild(tr);
      }
    }

    renderizarTabela();
  </script>
</body>

</html>
