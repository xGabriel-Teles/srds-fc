<body>

  <header class="site-header"></header>

  <main class="player-profile-page" id="matchPage">
    <div style="text-align:center; padding:80px 20px;">
      <p style="color:var(--cinza);">Carregando...</p>
    </div>

  <footer class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script>
    renderHeader('partidas.html');
    renderFooter();

    const params   = new URLSearchParams(window.location.search);
    const rawRound = params.get('round') || '';
    const roundNum = /^\d{1,4}$/.test(rawRound) ? parseInt(rawRound, 10) : NaN;
    const match    = !isNaN(roundNum) ? SRDS.matches.find(m => m.round === roundNum) : null;
    const page     = document.getElementById('matchPage');

    if (!match) {
      page.innerHTML = `
      <div style="text-align:center; padding:80px 20px;">
        <h2 style="font-size:32px; color:var(--cinza); margin-bottom:16px;">Rodada não encontrada</h2>
        <a href="partidas.html" style="color:var(--ouro); font-family:'Barlow Semi Condensed',sans-serif;">← Voltar às partidas</a>
      </div>`;
    } else {
      renderMatch(match);
    }

    function renderMatch(m) {
      document.title = `SRDS FC — Rodada ${m.round}`;

      const total = SRDS.matches.length;
      const prevRound = m.round > 1 ? m.round - 1 : null;
      const nextRound = m.round < total ? m.round + 1 : null;

      const navHtml = `
      <nav class="player-nav" style="margin-bottom:32px;">
        ${prevRound
          ? `<a href="partida.html?round=${prevRound}" class="player-nav-btn">${chevronLeft()} Rodada ${prevRound}</a>`
          : `<span class="player-nav-btn" style="opacity:0.3;pointer-events:none">${chevronLeft()} —</span>`}
        <div class="player-nav-center">Rodada ${m.round} / ${total}</div>
        ${nextRound
          ? `<a href="partida.html?round=${nextRound}" class="player-nav-btn">Rodada ${nextRound} ${chevronRight()}</a>`
          : `<span class="player-nav-btn" style="opacity:0.3;pointer-events:none">— ${chevronRight()}</span>`}
      </nav>`;

      /* ── Meta info ── */
      // Meta: pills de data e hora (mesma altura), local como bloco separado abaixo
      const metaPills = [];
      if (m.date) metaPills.push(`<span class="partida-detail-meta-item">📅 ${m.date}</span>`);
      if (m.time) metaPills.push(`<span class="partida-detail-meta-item">🕐 ${m.time}</span>`);

      let locBlockHtml = '';
      if (m.location) {
        const isObj   = typeof m.location === 'object' && m.location !== null;
        const venue   = isObj ? m.location.venue   : m.location;
        const address = isObj ? m.location.address : null;
        const mapsUrl = address
          ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address)
          : null;
        locBlockHtml = `<div class="partida-location-row">
          <span class="partida-location-row-venue">📍 ${venue}</span>`;
        if (address && mapsUrl) {
          locBlockHtml += `<a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="partida-location-row-addr">${address} ↗</a>`;
        } else if (address) {
          locBlockHtml += `<span class="partida-location-row-addr">${address}</span>`;
        }
        locBlockHtml += `</div>`;
      }

      /* ── Placar (ajuste 5: ambos os nomes acima, vencedor realçado com efeito dourado) ── */
      let placarHtml = '';
      if (m.result) {
        const azulWin = m.result.azul > m.result.vermelho;
        const vermWin = m.result.vermelho > m.result.azul;
        const empate = m.result.azul === m.result.vermelho;
        placarHtml = `
        <div class="placar-wrap">
          <div class="placar-side ${azulWin ? 'winner' : ''}">
            <div class="placar-team-label azul">Time Azul</div>
            <div class="placar-num ${azulWin ? 'winner-num' : ''}">${m.result.azul}</div>
          </div>
          <div class="placar-sep">
            <div class="placar-x">×</div>
            ${empate ? `<div class="placar-status">Empate</div>` : ''}
          </div>
          <div class="placar-side ${vermWin ? 'winner' : ''}">
            <div class="placar-team-label vermelho">Time Verm.</div>
            <div class="placar-num ${vermWin ? 'winner-num' : ''}">${m.result.vermelho}</div>
          </div>
        </div>`;
      } else {
        placarHtml = `<div class="placar-pending">Resultado não registrado</div>`;
      }

      /* ── MVP badge ── */
      const mvpPlayer = m.mvp ? getPlayerById(m.mvp) : null;
      const mvpHtml = mvpPlayer ? `
      <div class="match-mvp-banner">
        🏆 <strong>MVP da Partida:</strong> ${mvpPlayer.name}
      </div>` : '';

      /* ── Eventos agrupados (ajuste 4: emojis agrupados por jogador) ── */
      function buildEvents(scorerArr, assistArr) {
        // agrupa gols e assists pelo mesmo jogador/nome
        const map = new Map();

        scorerArr.forEach(ev => {
          const key = ev.guestName || ev.playerId;
          const name = ev.guestName || (getPlayerById(ev.playerId)?.name ?? '?');
          if (!map.has(key)) map.set(key, { name, goals: 0, assists: 0 });
          map.get(key).goals++;
        });
        assistArr.forEach(ev => {
          const key = ev.guestName || ev.playerId;
          const name = ev.guestName || (getPlayerById(ev.playerId)?.name ?? '?');
          if (!map.has(key)) map.set(key, { name, goals: 0, assists: 0 });
          map.get(key).assists++;
        });

        if (map.size === 0) return '<p class="no-events">—</p>';

        return [...map.values()].map(({ name, goals, assists }) => {
          const icons = '⚽'.repeat(goals) + '🎯'.repeat(assists);
          return `<div class="match-event">
          <span class="match-event-name">${name}</span>
          <span class="match-event-icons">${icons}</span>
        </div>`;
        }).join('');
      }

      const evAzul = buildEvents(
        m.scorers.filter(s => s.team === 'azul'),
        m.assists.filter(s => s.team === 'azul')
      );
      const evVerm = buildEvents(
        m.scorers.filter(s => s.team === 'vermelho'),
        m.assists.filter(s => s.team === 'vermelho')
      );

      /* ── Escalação (ordenada por posição) ── */
      function buildLineup(teamArr, teamKey) {
        if (!teamArr || teamArr.length === 0) {
          return `<p class="lineup-empty">Escalação não registrada</p>`;
        }

        // Resolve entradas e ordena por posição
        const resolved = teamArr
          .map(entry => resolveLineupEntry(entry, teamKey))
          .filter(Boolean)
          .sort((a, b) => a.posRank - b.posRank);

        return resolved.map(info => {
          const isMvp = m.mvp && info.id && info.id === m.mvp;

          const photoHtml = info.photo
            ? `<img src="${info.photo}" alt="${info.name}" class="lineup-photo">`
            : `<div class="lineup-avatar-wrap">${avatarSVG(teamKey === 'azul' ? '#c99f40' : '#ead186')}</div>`;

          const numHtml = info.number !== null
            ? `<span class="lineup-shirt-number">${info.number}</span>` : '';

          const guestTag = info.isGuest
            ? `<span class="lineup-guest-tag">Avulso</span>` : '';

          const mvpTag = isMvp
            ? `<span class="lineup-mvp-tag">🏆 MVP</span>` : '';

          const posHtml = info.position && !info.isGuest
            ? `<div class="lineup-pos">${info.position}</div>` : '';

          return `
          <div class="lineup-player${isMvp ? ' lineup-mvp' : ''}">
            <div class="lineup-photo-wrap ${teamKey}">${photoHtml}</div>
            ${numHtml}
            <div class="lineup-player-info">
              <div class="lineup-player-name">
                ${info.name}${guestTag}${mvpTag}
              </div>
              ${posHtml}
            </div>
          </div>`;
        }).join('');
      }

      /* ── Monta o HTML dos times — mobile: tabs | desktop: side-by-side ── */
      const lineupAzul = buildLineup(m.teamAzul, 'azul');
      const lineupVerm = buildLineup(m.teamVermelho, 'vermelho');

      page.innerHTML = `
      ${navHtml}

      <div class="partida-detail-header">
        <div class="section-header" style="margin-bottom:12px;">
          <h2 class="section-title">Rodada <span>${m.round}</span></h2>
          <span class="section-meta">Temporada 2026</span>
        </div>
        <div class="gold-line"></div>
        <div class="partida-detail-meta">${metaPills.join('')}</div>
        ${locBlockHtml}
      </div>

      <div style="margin:28px 0;">
        ${placarHtml}
      </div>

      ${mvpHtml}

      <!-- MOBILE: abas sobrepostas (ajuste 1) -->
      <div class="match-tabs-mobile">
        <div class="match-tab-buttons">
          <button class="match-tab-btn active" data-team="azul">Time Azul</button>
          <button class="match-tab-btn" data-team="vermelho">Time Vermelho</button>
        </div>

        <div class="match-tab-panel" data-panel="azul">
          <div class="match-team-section">
            <div class="match-team-section-title">Escalação</div>
            <div class="lineup-list">${lineupAzul}</div>
          </div>
          <div class="match-team-section">
            <div class="match-team-section-title">Participações</div>
            ${evAzul}
          </div>
        </div>

        <div class="match-tab-panel hidden" data-panel="vermelho">
          <div class="match-team-section">
            <div class="match-team-section-title">Escalação</div>
            <div class="lineup-list">${lineupVerm}</div>
          </div>
          <div class="match-team-section">
            <div class="match-team-section-title">Participações</div>
            ${evVerm}
          </div>
        </div>
      </div>

      <!-- DESKTOP: dois lados (ajuste 7: cores internas) -->
      <div class="match-teams-grid">
        <div class="match-team-col team-col-azul">
          <div class="match-team-header azul">Time Azul</div>
          <div class="match-team-body azul-body">
            <div class="match-team-section">
              <div class="match-team-section-title">Escalação</div>
              <div class="lineup-list">${lineupAzul}</div>
            </div>
            <div class="match-team-section">
              <div class="match-team-section-title">Participações</div>
              ${evAzul}
            </div>
          </div>
        </div>

        <div class="match-team-col team-col-vermelho">
          <div class="match-team-header vermelho">Time Vermelho</div>
          <div class="match-team-body vermelho-body">
            <div class="match-team-section">
              <div class="match-team-section-title">Escalação</div>
              <div class="lineup-list">${lineupVerm}</div>
            </div>
            <div class="match-team-section">
              <div class="match-team-section-title">Participações</div>
              ${evVerm}
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top:32px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
        <a href="partidas.html"
           style="font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;color:var(--cinza);display:inline-flex;align-items:center;gap:6px;transition:color 0.2s;"
           onmouseover="this.style.color='var(--ouro)'" onmouseout="this.style.color='var(--cinza)'">
          ← Voltar às partidas
        </a>
        <button id="btnExportar" onclick="exportarArte()" style="font-family:'Barlow Semi Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--azul);background:var(--ouro);border:none;border-radius:6px;padding:9px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity 0.2s;">
          📤 Exportar arte
        </button>
      </div>
    `;

      /* ── Lógica das abas mobile ── */
      document.querySelectorAll('.match-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const team = btn.dataset.team;
          document.querySelectorAll('.match-tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.match-tab-panel').forEach(p => p.classList.add('hidden'));
          btn.classList.add('active');
          document.querySelector(`.match-tab-panel[data-panel="${team}"]`).classList.remove('hidden');
        });
      });
    }
  </script>

  <!-- ── Script de exportação de arte v1.10 ── -->
  <script>
  function exportarArte() {
    if (!match) { alert('Nenhuma partida carregada.'); return; }
    const m = match;

    const btn = document.getElementById('btnExportar');
    const resetBtn = () => { if (btn) { btn.innerHTML = '📤 Exportar arte'; btn.disabled = false; } };
    if (btn) { btn.textContent = '⏳ Gerando arte...'; btn.disabled = true; }

    // ── Helpers de dados ──
    const playerName = id => { const p = getPlayerById(id); return p ? p.name : id; };
    const locationFull = () => {
      if (!m.location) return '';
      if (typeof m.location === 'object')
        return m.location.venue + (m.location.address ? ' · ' + m.location.address : '');
      return m.location;
    };
    const buildPartic = (scorers, assists) => {
      const map = new Map();
      (scorers || []).forEach(ev => {
        const key  = ev.guestName || ev.playerId;
        const name = ev.guestName || playerName(ev.playerId);
        if (!map.has(key)) map.set(key, { name, g: 0, a: 0 });
        map.get(key).g++;
      });
      (assists || []).forEach(ev => {
        const key  = ev.guestName || ev.playerId;
        const name = ev.guestName || playerName(ev.playerId);
        if (!map.has(key)) map.set(key, { name, g: 0, a: 0 });
        map.get(key).a++;
      });
      return [...map.values()];
    };
    const lineupNames = arr => {
      if (!arr || !arr.length) return [];
      return arr.map(e => {
        if (typeof e === 'string') { const p = getPlayerById(e); return p ? p.name : e; }
        if (e && e.guest) return e.name + ' (avulso)';
        return '?';
      });
    };

    const partAzul = buildPartic(
      (m.scorers||[]).filter(s=>s.team==='azul'),
      (m.assists||[]).filter(s=>s.team==='azul')
    );
    const partVerm = buildPartic(
      (m.scorers||[]).filter(s=>s.team==='vermelho'),
      (m.assists||[]).filter(s=>s.team==='vermelho')
    );
    const azulNames = lineupNames(m.teamAzul);
    const vermNames = lineupNames(m.teamVermelho);

    const mvpPlayer   = m.mvp ? getPlayerById(m.mvp) : null;
    const mvpPhotoSrc = mvpPlayer ? (mvpPlayer.photo?.uni1 || mvpPlayer.photo?.uni2 || null) : null;
    const sponsorList = (SRDS.sponsors || []).filter(s => s.logo);

    // ── Carrega imagens (same-origin, sem crossOrigin) ──
    function loadImg(src) {
      return new Promise(resolve => {
        if (!src) { resolve(null); return; }
        const img = new Image();
        img.onload  = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    const toLoad = [{ key: 'logo', src: 'img/logo/logo-srds2.png' }];
    if (mvpPhotoSrc) toLoad.push({ key: 'mvp', src: mvpPhotoSrc });
    sponsorList.forEach((s, i) => toLoad.push({ key: 'sp_' + i, src: s.logo }));

    Promise.all(toLoad.map(({ key, src }) =>
      loadImg(src).then(img => ({ key, img }))
    )).then(results => {
      const cache = {};
      results.forEach(({ key, img }) => { cache[key] = img; });
      renderCanvas(cache);
    });

    function renderCanvas(cache) {
      try {
        var W=1080,H=1440,canvas=document.createElement('canvas');
        canvas.width=W;canvas.height=H;
        var ctx=canvas.getContext('2d');
        var C={azul:'#192a3e',ouro:'#c99f40',ouroCl:'#ead186',cinza:'#8a9ab0',cinzaE:'#556070',branco:'#f0f4f8',azulT:'#7eb3e8',vermT:'#e4738a'};
        function cTxt(t,y,font,col){col=col||C.branco;ctx.font=font;ctx.fillStyle=col;ctx.textAlign='center';ctx.fillText(String(t),W/2,y);}
        function sep(y,op){op=op||0.3;ctx.strokeStyle='rgba(201,159,64,'+op+')';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(60,y);ctx.lineTo(W-60,y);ctx.stroke();}
        function rRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
        function drawImgCover(img,x,y,w,h){if(!img)return;var ir=img.naturalWidth/img.naturalHeight,br=w/h,sx,sy,sw,sh;if(ir>br){sh=img.naturalHeight;sw=sh*br;sx=(img.naturalWidth-sw)/2;sy=0;}else{sw=img.naturalWidth;sh=sw/br;sx=0;sy=(img.naturalHeight-sh)/2;}ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);}

        ctx.fillStyle=C.azul;ctx.fillRect(0,0,W,H);
        var gradH=ctx.createLinearGradient(0,0,W,0);gradH.addColorStop(0,'rgba(201,159,64,0.22)');gradH.addColorStop(0.5,'rgba(201,159,64,0.08)');gradH.addColorStop(1,'rgba(201,159,64,0.22)');ctx.fillStyle=gradH;ctx.fillRect(0,0,W,400);var gradV=ctx.createLinearGradient(0,0,0,400);gradV.addColorStop(0,'rgba(201,159,64,0.20)');gradV.addColorStop(0.6,'rgba(201,159,64,0.04)');gradV.addColorStop(1,'rgba(201,159,64,0)');ctx.fillStyle=gradV;ctx.fillRect(0,0,W,400);
        ctx.fillStyle=C.ouro;ctx.fillRect(0,0,W,5);

        var LOGO_SIZE=92,clubLogo=cache['logo'];
        if(clubLogo){ctx.drawImage(clubLogo,16,12,LOGO_SIZE,LOGO_SIZE);ctx.drawImage(clubLogo,W-LOGO_SIZE-16,12,LOGO_SIZE,LOGO_SIZE);}

        cTxt('SRDS FC',72,'bold 62px "Barlow Semi Condensed", sans-serif',C.ouro);
        cTxt('Rodada '+m.round+' · Temporada 2026',108,'500 26px "Barlow Semi Condensed", sans-serif',C.cinza);
        sep(126,0.35);

        var infoY=160;
        if(m.date){cTxt('📅 '+m.date+(m.time?' · 🕐 '+m.time:''),infoY,'500 24px "Barlow Semi Condensed", sans-serif',C.ouroCl);infoY+=33;}
        if(m.location){cTxt('📍 '+locationFull(),infoY,'400 20px "Barlow Semi Condensed", sans-serif',C.cinza);infoY+=30;}
        sep(infoY+4,0.2);

        var placY=infoY+28,afterPlacar=placY+80;
        if(m.result){
          var azulWin=m.result.azul>m.result.vermelho,vermWin=m.result.vermelho>m.result.azul,empate=m.result.azul===m.result.vermelho;
          ctx.font='bold 26px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.azulT;ctx.textAlign='center';ctx.fillText('TIME AZUL',270,placY);ctx.fillStyle=C.vermT;ctx.fillText('TIME VERM.',W-270,placY);
          ctx.font='bold 128px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=azulWin?C.ouroCl:C.cinzaE;ctx.textAlign='center';ctx.fillText(String(m.result.azul),270,placY+118);ctx.fillStyle=vermWin?C.ouroCl:C.cinzaE;ctx.fillText(String(m.result.vermelho),W-270,placY+118);
          ctx.font='300 54px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.cinzaE;ctx.fillText('×',W/2,placY+98);
          if(empate)cTxt('Empate',placY+136,'500 21px "Barlow Semi Condensed", sans-serif',C.cinza);
          afterPlacar=placY+148;
        }else{cTxt('Resultado não registrado',placY+60,'italic 28px "Barlow Semi Condensed", sans-serif',C.cinza);}
        sep(afterPlacar+4,0.22);

        var colAX=58,colVX=W/2+18,colW=W/2-78,escY=afterPlacar+26;
        ctx.font='bold 22px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.azulT;ctx.textAlign='left';ctx.fillText('TIME AZUL',colAX,escY);ctx.fillStyle=C.vermT;ctx.fillText('TIME VERM.',colVX,escY);escY+=8;
        ctx.strokeStyle='rgba(126,179,232,0.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(colAX,escY);ctx.lineTo(colAX+colW,escY);ctx.stroke();
        ctx.strokeStyle='rgba(228,115,138,0.4)';ctx.beginPath();ctx.moveTo(colVX,escY);ctx.lineTo(colVX+colW,escY);ctx.stroke();escY+=24;
        var lnH=26,maxRows=Math.max(azulNames.length,vermNames.length);ctx.font='400 19px "Barlow Semi Condensed", sans-serif';
        for(var i=0;i<maxRows;i++){var yy=escY+i*lnH;if(azulNames[i]){ctx.fillStyle=C.branco;ctx.textAlign='left';ctx.fillText(azulNames[i],colAX,yy);}if(vermNames[i]){ctx.fillStyle=C.branco;ctx.fillText(vermNames[i],colVX,yy);}}
        var escEnd=escY+maxRows*lnH+8;sep(escEnd+2,0.2);

        var pY=escEnd+22;ctx.font='bold 21px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.azulT;ctx.textAlign='left';ctx.fillText('PARTICIPAÇÕES',colAX,pY);ctx.fillStyle=C.vermT;ctx.fillText('PARTICIPAÇÕES',colVX,pY);pY+=26;
        ctx.font='400 19px "Barlow Semi Condensed", sans-serif';
        var maxP=Math.max(partAzul.length,partVerm.length,1);
        for(var j=0;j<maxP;j++){var yp=pY+j*25;if(partAzul[j]){ctx.fillStyle=C.branco;ctx.textAlign='left';ctx.fillText(partAzul[j].name+'  '+'⚽'.repeat(partAzul[j].g)+'🎯'.repeat(partAzul[j].a),colAX,yp);}if(partVerm[j]){ctx.fillStyle=C.branco;ctx.fillText(partVerm[j].name+'  '+'⚽'.repeat(partVerm[j].g)+'🎯'.repeat(partVerm[j].a),colVX,yp);}}
        var partEnd=pY+maxP*25;

        // MVP — centralizado entre participações e seção Apoio
        var afterMvp=partEnd;
        if(mvpPlayer){
          var mvpBY=partEnd+36,mvpBW=520,mvpBH=110,mvpBX=(W-mvpBW)/2;
          sep(mvpBY-18,0.18);
          ctx.fillStyle='rgba(201,159,64,0.12)';rRect(mvpBX,mvpBY,mvpBW,mvpBH,12);ctx.fill();
          ctx.strokeStyle='rgba(201,159,64,0.45)';ctx.lineWidth=1.5;rRect(mvpBX,mvpBY,mvpBW,mvpBH,12);ctx.stroke();
          var mvpImg=cache['mvp'],FOTO_SZ=90,FOTO_X=mvpBX+10,FOTO_Y=mvpBY+(mvpBH-FOTO_SZ)/2,tOffX=0;
          if(mvpImg){var rr=8;ctx.save();rRect(FOTO_X,FOTO_Y,FOTO_SZ,FOTO_SZ,rr);ctx.clip();drawImgCover(mvpImg,FOTO_X,FOTO_Y,FOTO_SZ,FOTO_SZ);ctx.restore();ctx.strokeStyle=C.ouro;ctx.lineWidth=2;rRect(FOTO_X,FOTO_Y,FOTO_SZ,FOTO_SZ,rr);ctx.stroke();tOffX=FOTO_SZ+14;}
          var tX=mvpBX+tOffX+14;
          ctx.font='bold 40px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.ouro;ctx.textAlign='left';ctx.fillText('🏆',tX,mvpBY+58);
          ctx.font='bold 22px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.ouroCl;ctx.fillText('MVP da Partida',tX+50,mvpBY+36);
          ctx.font='600 30px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.branco;ctx.fillText(mvpPlayer.name,tX+50,mvpBY+74);
          afterMvp=mvpBY+mvpBH+28;
        }

        ctx.fillStyle='rgba(201,159,64,0.08)';ctx.fillRect(0,H-72,W,72);ctx.fillStyle=C.ouro;ctx.fillRect(0,H-72,W,2);
        cTxt('@srds.fc · srdsfc.com.br',H-36,'bold 23px "Barlow Semi Condensed", sans-serif',C.ouro);
        cTxt('Futebol amador · Porto Alegre, RS',H-10,'400 17px "Barlow Semi Condensed", sans-serif',C.cinza);

        var LOGO_SP_H=66,LOGO_SP_W=110,LOGO_SP_GAP=20,sAreaY=Math.max(afterMvp+16,H-210);
        sep(sAreaY,0.18);ctx.font='bold 20px "Barlow Semi Condensed", sans-serif';ctx.fillStyle=C.branco;ctx.textAlign='center';ctx.globalAlpha=0.65;ctx.fillText('Apoio:',W/2,sAreaY+24);ctx.globalAlpha=1;
        if(sponsorList.length>0){var totalSW=sponsorList.length*(LOGO_SP_W+LOGO_SP_GAP)-LOGO_SP_GAP,sStartX=(W-totalSW)/2,sY=sAreaY+32;sponsorList.forEach(function(s,ii){var sImg=cache['sp_'+ii];if(!sImg)return;var ratio=sImg.naturalWidth/sImg.naturalHeight||1,dw=Math.min(LOGO_SP_W,LOGO_SP_H*ratio),dh=dw/ratio,dx=sStartX+ii*(LOGO_SP_W+LOGO_SP_GAP)+(LOGO_SP_W-dw)/2,dy=sY+(LOGO_SP_H-dh)/2;ctx.drawImage(sImg,dx,dy,dw,dh);});}

        resetBtn();var link=document.createElement('a');link.download='SRDS_FC_Rodada'+m.round+'.png';link.href=canvas.toDataURL('image/png');link.click();
      }catch(err){resetBtn();alert('Erro ao gerar a arte: '+err.message);}
    }
  }
  </script>
