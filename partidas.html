<body>
  <header class="site-header"></header>
  <main class="section fade-in">
    <div class="section-header">
      <h2 class="section-title">Partidas <span>2026</span></h2>
      <span class="section-meta" id="matchCount"></span>
    </div>
    <div class="gold-line"></div>
    <p class="page-intro">Histórico de rodadas da temporada 2026. Clique em uma partida para ver os detalhes completos.
    </p>
    <div class="partidas-grid" id="partidasGrid"></div>
  </main>
  <footer class="site-footer"></footer>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script>
    renderHeader('partidas.html');
    renderFooter();
    document.getElementById('matchCount').textContent =
      `${SRDS.matches.length} rodada${SRDS.matches.length !== 1 ? 's' : ''}`;
    const grid = document.getElementById('partidasGrid');
    [...SRDS.matches].reverse().forEach(m => {
      const hasResult = m.result !== null;
      const hasDetails = hasResult || m.location || m.time ||
        (m.teamAzul && m.teamAzul.length > 0) ||
        (m.teamVermelho && m.teamVermelho.length > 0);
      let winClass = '';
      if (hasResult) {
        if (m.result.azul > m.result.vermelho) winClass = 'card-win-azul';
        else if (m.result.vermelho > m.result.azul) winClass = 'card-win-vermelho';
        else winClass = 'card-win-empate';
      }
      let scoreLine = '';
      if (hasResult) {
        scoreLine = `
        <div class="partida-score">
          <span class="partida-score-team azul">Time Azul</span>
          <span class="partida-score-placar">${m.result.azul} — ${m.result.vermelho}</span>
          <span class="partida-score-team vermelho">Time Verm.</span>
        </div>`;
      } else {
        scoreLine = `<div class="partida-score-pending">Resultado não registrado</div>`;
      }
      const card = document.createElement('div');
      card.className = ('partida-card' + (hasDetails ? ' clickable' : '') + ' ' + winClass).trim();
      card.innerHTML = `
      <div class="partida-card-top">
        <div class="partida-round">Rodada ${m.round}</div>
        <div class="partida-date-info">
          <span class="partida-date">${m.date}</span>
          ${m.time ? `<span class="partida-time">${m.time}</span>` : ''}
        </div>
      </div>
      ${m.location ? (() => {
        const isObj   = typeof m.location === 'object' && m.location !== null;
        const venue   = isObj ? m.location.venue   : m.location;
        const address = isObj ? m.location.address : null;
        const mapsUrl = address ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address) : null;
        return `<div class="partida-location-card">
          <span class="partida-location-venue">📍 ${venue}</span>
          ${address ? (mapsUrl
            ? `<a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="partida-location-addr" onclick="event.stopPropagation()">${address}</a>`
            : `<span class="partida-location-addr">${address}</span>`)
          : ''}
        </div>`;
      })() : ''}
      ${scoreLine}
      ${hasDetails ? `<div class="partida-link">Ver detalhes →</div>` : ''}
    `;
      if (hasDetails) {
        card.addEventListener('click', () => { window.location.href = `partida.html?round=${m.round}`; });
      }
      grid.appendChild(card);
    });

    // ── Próxima partida ──
    if (SRDS.nextMatch) {
      const nx = SRDS.nextMatch;
      const nxCard = document.createElement('div');
      nxCard.className = 'partida-card partida-card-next';
      const nxVenue = nx.location
        ? (typeof nx.location === 'object' ? nx.location.venue : nx.location)
        : null;
      nxCard.innerHTML = `
        <div class="partida-card-next-badge">Próxima partida</div>
        <div class="partida-card-top" style="margin-top:6px;">
          <div class="partida-round">Rodada ${nx.round}</div>
          <div class="partida-date-info">
            <span class="partida-date">${nx.date}</span>
            ${nx.time ? `<span class="partida-time">${nx.time}</span>` : ''}
          </div>
        </div>
        ${nxVenue ? `<div class="partida-location">📍 ${nxVenue}</div>` : ''}
        <div class="partida-score-pending" style="color:var(--ouro-claro);font-style:normal;">A realizar</div>
      `;
      grid.appendChild(nxCard);
    }
  </script>
</body>

</html>
